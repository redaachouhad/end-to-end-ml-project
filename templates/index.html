<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Student Performance Predictor</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body
    class="min-h-screen bg-gradient-to-br from-indigo-600 via-purple-600 to-pink-500 flex items-center justify-center p-6"
  >
    <div
      class="bg-white/90 backdrop-blur-lg shadow-2xl rounded-3xl p-8 w-full max-w-3xl border border-white/30"
    >
      <h1 class="text-3xl font-bold text-center text-gray-800 mb-2">
        Student Performance Predictor
      </h1>
      <p class="text-center text-gray-500 mb-6">
        Enter student information to predict performance
      </p>

      <form id="predictForm" class="grid grid-cols-2 gap-5">
        <!-- Gender -->
        <div class="flex flex-col">
          <label class="mb-1 text-sm font-medium text-gray-700">Gender</label>
          <select
            name="gender"
            class="p-2.5 rounded-xl border border-gray-300 bg-gray-50 text-gray-800 focus:bg-white focus:ring-2 focus:ring-purple-500 focus:outline-none hover:shadow-md transition"
          >
            <option value="">Select gender</option>
            <option value="male">Male</option>
            <option value="female">Female</option>
          </select>
          <span class="error text-red-500 text-sm mt-1"></span>
        </div>

        <!-- Race / Ethnicity -->
        <div class="flex flex-col">
          <label class="mb-1 text-sm font-medium text-gray-700"
            >Race / Ethnicity</label
          >
          <select
            name="race_ethnicity"
            class="p-2.5 rounded-xl border border-gray-300 bg-gray-50 text-gray-800 focus:bg-white focus:ring-2 focus:ring-purple-500 focus:outline-none hover:shadow-md transition"
          >
            <option value="">Select group</option>
            <option value="group A">Group A</option>
            <option value="group B">Group B</option>
            <option value="group C">Group C</option>
            <option value="group D">Group D</option>
            <option value="group E">Group E</option>
          </select>
          <span class="error text-red-500 text-sm mt-1"></span>
        </div>

        <!-- Parental Education -->
        <div class="flex flex-col col-span-2">
          <label class="mb-1 text-sm font-medium text-gray-700"
            >Parental Level of Education</label
          >
          <select
            name="parental_level_of_education"
            class="p-2.5 rounded-xl border border-gray-300 bg-gray-50 text-gray-800 focus:bg-white focus:ring-2 focus:ring-purple-500 focus:outline-none hover:shadow-md transition"
          >
            <option value="">Select level</option>
            <option value="some high school">Some High School</option>
            <option value="high school">High School</option>
            <option value="some college">Some College</option>
            <option value="associate's degree">Associate's Degree</option>
            <option value="bachelor's degree">Bachelor's Degree</option>
            <option value="master's degree">Master's Degree</option>
          </select>
          <span class="error text-red-500 text-sm mt-1"></span>
        </div>

        <!-- Lunch -->
        <div class="flex flex-col">
          <label class="mb-1 text-sm font-medium text-gray-700"
            >Lunch Type</label
          >
          <select
            name="lunch"
            class="p-2.5 rounded-xl border border-gray-300 bg-gray-50 text-gray-800 focus:bg-white focus:ring-2 focus:ring-purple-500 focus:outline-none hover:shadow-md transition"
          >
            <option value="">Select type</option>
            <option value="standard">Standard</option>
            <option value="free/reduced">Free / Reduced</option>
          </select>
          <span class="error text-red-500 text-sm mt-1"></span>
        </div>

        <!-- Test Preparation -->
        <div class="flex flex-col">
          <label class="mb-1 text-sm font-medium text-gray-700"
            >Test Preparation</label
          >
          <select
            name="test_preparation_course"
            class="p-2.5 rounded-xl border border-gray-300 bg-gray-50 text-gray-800 focus:bg-white focus:ring-2 focus:ring-purple-500 focus:outline-none hover:shadow-md transition"
          >
            <option value="">Select option</option>
            <option value="none">None</option>
            <option value="completed">Completed</option>
          </select>
          <span class="error text-red-500 text-sm mt-1"></span>
        </div>

        <!-- Reading Score -->
        <div class="flex flex-col">
          <label class="mb-1 text-sm font-medium text-gray-700"
            >Reading Score</label
          >
          <input
            type="number"
            name="reading_score"
            min="0"
            max="100"
            class="p-2.5 rounded-xl border border-gray-300 bg-gray-50 text-gray-800 focus:bg-white focus:ring-2 focus:ring-purple-500 focus:outline-none hover:shadow-md transition"
          />
          <span class="error text-red-500 text-sm mt-1"></span>
        </div>

        <!-- Writing Score -->
        <div class="flex flex-col">
          <label class="mb-1 text-sm font-medium text-gray-700"
            >Writing Score</label
          >
          <input
            type="number"
            name="writing_score"
            min="0"
            max="100"
            class="p-2.5 rounded-xl border border-gray-300 bg-gray-50 text-gray-800 focus:bg-white focus:ring-2 focus:ring-purple-500 focus:outline-none hover:shadow-md transition"
          />
          <span class="error text-red-500 text-sm mt-1"></span>
        </div>
      </form>

      <!-- Buttons -->
      <div class="flex gap-4 mt-8">
        <button
          id="predictBtn"
          class="flex-1 bg-gradient-to-r from-indigo-600 to-purple-600 text-white py-3 rounded-xl font-semibold hover:scale-[1.02] hover:shadow-lg transition-all duration-200"
        >
          Predict
        </button>
        <button
          id="resetBtn"
          class="flex-1 bg-gray-300 text-gray-800 py-3 rounded-xl font-semibold hover:scale-[1.02] hover:shadow-lg transition-all duration-200"
        >
          Reset
        </button>
      </div>

      <!-- Prediction Result -->
      <div
        id="result"
        class="mt-6 text-center bg-green-50 border border-green-200 p-4 rounded-xl hidden"
      >
        <p class="text-gray-700">
          Prediction Result: <strong>(Math Score)</strong>
        </p>
        <p id="predictionValue" class="text-3xl font-bold text-green-600"></p>
      </div>
    </div>

    <script>
      const form = document.getElementById("predictForm");
      const predictBtn = document.getElementById("predictBtn");
      const resetBtn = document.getElementById("resetBtn");
      const resultDiv = document.getElementById("result");
      const predictionValue = document.getElementById("predictionValue");

      predictBtn.addEventListener("click", async () => {
        const formData = {};
        let valid = true;

        // Clear previous errors
        form
          .querySelectorAll(".error")
          .forEach((span) => (span.textContent = ""));

        // Collect data and validate
        form.querySelectorAll("input, select").forEach((input) => {
          const value = input.value.trim();
          if (!value) {
            input.nextElementSibling.textContent =
              input.name.replace("_", " ") + " is required";
            valid = false;
          } else {
            formData[input.name] =
              input.type === "number" ? Number(value) : value;
          }
        });

        if (!valid) return;

        // Call backend
        predictBtn.textContent = "Predicting...";
        try {
          const res = await fetch("/predict", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(formData),
          });
          const data = await res.json();
          if (data.prediction !== undefined) {
            predictionValue.textContent = data.prediction;
            resultDiv.classList.remove("hidden");
          } else {
            alert("Error: " + data.error);
          }
        } catch (err) {
          alert("Error connecting to backend");
        }
        predictBtn.textContent = "Predict";
      });

      resetBtn.addEventListener("click", () => {
        form.reset();
        form
          .querySelectorAll(".error")
          .forEach((span) => (span.textContent = ""));
        resultDiv.classList.add("hidden");
      });
    </script>
  </body>
</html>
